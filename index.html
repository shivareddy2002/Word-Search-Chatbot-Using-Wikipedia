<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PICTOPEDIA - Word Search Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-app" aria-label="PICTOPEDIA chatbot">
      <header class="chat-header">
        <div>
          <h1>PICTOPEDIA</h1>
          <p>Word Search Chatbot using Wikipedia API</p>
        </div>

        <div class="header-controls">
          <label class="lang-label" for="languageSelect">Language</label>
          <select id="languageSelect" title="Choose Wikipedia language">
            <option value="en">English (en)</option>
            <option value="hi">Hindi (hi)</option>
            <option value="es">Spanish (es)</option>
            <option value="fr">French (fr)</option>
          </select>

          <label class="theme-switch" for="themeToggle" title="Toggle dark mode">
            <input type="checkbox" id="themeToggle" />
            <span class="slider"></span>
          </label>

          <button id="downloadBtn" class="icon-btn" type="button" title="Download chat history">
            ⬇
          </button>
        </div>
      </header>

      <section id="chatMessages" class="chat-messages" aria-live="polite"></section>

      <div class="input-area">
        <div id="suggestions" class="suggestions" aria-label="Search suggestions"></div>

        <div class="input-row">
          <button id="micBtn" class="icon-btn" type="button" title="Voice input">🎤</button>
          <input
            id="userInput"
            type="text"
            placeholder="Ask anything from Wikipedia..."
            autocomplete="off"
            aria-label="Type your query"
          />
          <button id="sendBtn" class="send-btn" type="button">Send</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
