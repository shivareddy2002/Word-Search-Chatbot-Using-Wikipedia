<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PICTOPEDIA - Wikipedia Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <div class="mobile-backdrop" id="mobileBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>PICTOPEDIA</h2>
        <button id="newChatBtn" class="btn btn-primary" type="button">+ New Chat</button>
      </div>

      <div class="sidebar-search-wrap">
        <input id="conversationSearch" type="text" placeholder="Search in current chat..." />
      </div>

      <div class="sidebar-list" id="chatList"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuBtn" class="icon-btn mobile-only" type="button" aria-label="Open sidebar">☰</button>
          <div>
            <h1>PICTOPEDIA</h1>
            <p>Wikipedia + AI-style Chatbot</p>
          </div>
        </div>

        <div class="topbar-right">
          <select id="languageSelect" title="Select language">
            <option value="en">English (en)</option>
            <option value="hi">Hindi (hi)</option>
            <option value="te">Telugu (te)</option>
            <option value="ta">Tamil (ta)</option>
            <option value="kn">Kannada (kn)</option>
            <option value="ml">Malayalam (ml)</option>
            <option value="bn">Bengali (bn)</option>
            <option value="mr">Marathi (mr)</option>
          </select>
          <button id="themeBtn" class="icon-btn" type="button" title="Toggle theme">🌙</button>
          <button id="downloadBtn" class="icon-btn" type="button" title="Download chat as text">⬇ TXT</button>
          <button id="pdfBtn" class="icon-btn" type="button" title="Export chat as PDF">📄 PDF</button>
        </div>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <footer class="composer-wrap">
        <div id="suggestions" class="suggestions"></div>
        <div class="composer">
          <button id="micBtn" class="icon-btn" type="button" title="Speech to text">🎤</button>
          <input id="promptInput" type="text" placeholder="Ask anything from Wikipedia..." autocomplete="off" />
          <button id="sendBtn" class="btn btn-send" type="button">Send</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
