<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Search Chat Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <div class="mobile-backdrop" id="mobileBackdrop"></div>

    <header class="app-header">
      <div class="app-header-left">
        <button id="menuBtn" class="icon-btn" type="button" aria-label="Toggle sidebar">☰</button>
        <h2>CHAT BOT</h2>
      </div>

      <div class="app-header-center">
        <h1>Word Search Chat Bot</h1>
      </div>

      <div class="app-header-right">
        <select id="languageSelect" title="Select language">
          <option value="en">English </option>
          <option value="hi">Hindi </option>
          <option value="te">Telugu </option>
          <option value="ta">Tamil </option>
          <option value="kn">Kannada </option>
          <option value="ml">Malayalam </option>
          <option value="bn">Bengali </option>
          <option value="mr">Marathi </option>
        </select>
        <button id="themeBtn" class="icon-btn" type="button" title="Toggle theme">🌙</button>
        <button id="downloadBtn" class="icon-btn" type="button" title="Download chat as text">📩</button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button id="newChatBtn" class="btn btn-primary" type="button">➕ New Chat</button>
      </div>

      <div class="sidebar-search-wrap">
        <input id="conversationSearch" type="text" placeholder="Search in current chat..." />
        <small id="searchStatus" class="search-status"></small>
      </div>

      <div class="sidebar-list" id="chatList"></div>
    </aside>

    <main class="main">
      <section class="messages" id="messages" aria-live="polite"></section>

      <footer class="composer-wrap">
        <div class="suggestion-tray" id="suggestionTray">
          <button class="suggestion-chip" type="button" data-suggestion="Artificial intelligence">AI</button>
          <button class="suggestion-chip" type="button" data-suggestion="ISRO">ISRO</button>
          <button class="suggestion-chip" type="button" data-suggestion="World War II">World War II</button>
          <button class="suggestion-chip" type="button" data-suggestion="Quantum computing">Quantum computing</button>
        </div>
        <div class="composer">
          <input id="promptInput" type="text" placeholder="Ask anything from Wikipedia..." autocomplete="off" />
          <button id="micBtn" class="icon-btn" type="button" title="Speech to text">🎙️</button>
          <button id="sendBtn" class="btn btn-send" type="button">Send</button>
          
        </div>
      </footer>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
